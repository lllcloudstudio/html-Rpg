<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dynamic R Plot</title>
</head>
<body>
    <form id="plotForm">
        <label for="species">Select Iris Species:</label>
        <select id="species" name="species">
            <option value="setosa">Setosa</option>
            <option value="versicolor">Versicolor</option>
            <option value="virginica">Virginica</option>
        </select>
        <button type="submit">Generate Plot</button>
    </form>

    <div style="margin-top: 20px;">
        <img id="plotImage" src="" alt="Plot will appear here" style="display:none; max-width: 600px;">
    </div>

    <script>
        document.getElementById('plotForm').addEventListener('submit', async function(e) {
            e.preventDefault(); // Stop the form from reloading the page
            
            const formData = new FormData(this);
            const params = new URLSearchParams(formData);

            try {
                // Adjust port to match your Plumber API's running port
                const response = await fetch('http://localhost:8000/generate_plot', {
                    method: 'POST',
                    body: params
                });

                if (!response.ok) throw new Error('Failed to generate plot');

                // Convert the binary image response into a Base64 Object URL
                const blob = await response.blob();
                const imageUrl = URL.createObjectUrl(blob);

                // Display the image
                const imgElement = document.getElementById('plotImage');
                imgElement.src = imageUrl;
                imgElement.style.display = 'block';
            } catch (error) {
                console.error('Error:', error);
            }
        });
    </script>
</body>
</html>
