<!DOCTYPE html>
<html>
<head>
  <title>Dropdown Plot Example</title>
</head>
<body>
  <h2>Select Parameters</h2>

  <label for="category">Category:</label>
  <select id="category">
    <option value="A">A</option>
    <option value="B">B</option>
    <option value="C">C</option>
  </select>

  <label for="color">Color:</label>
  <select id="color">
    <option value="blue">Blue</option>
    <option value="red">Red</option>
    <option value="green">Green</option>
  </select>

  <button onclick="updatePlot()">Generate Plot</button>

  <h3>Plot Output:</h3>
  <img id="plotImage" src="" alt="Plot will appear here" style="border:1px solid #ccc;">

  <script>
    function updatePlot() {
      const category = document.getElementById("category").value;
      const color = document.getElementById("color").value;

      // Construct API URL
      const url = `http://localhost:8000/plot?category=${encodeURIComponent(category)}&color=${encodeURIComponent(color)}`;

      // Update image source
      document.getElementById("plotImage").src = url;
    }
  </script>
</body>
</html>
