<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plumber POST Example</title>
</head>
<body>
    <!-- Point action to your running Plumber API URL and POST endpoint -->
    <form action="http://localhost:8000/process-data" method="POST">
        <label for="username">Enter your name:</label>
        <input type="text" id="username" name="user_name" required>
        
        <button type="submit">Submit</button>
    </form>
</body>
</html>
