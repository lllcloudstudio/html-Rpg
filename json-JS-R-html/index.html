<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>People Search</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    table { border-collapse: collapse; width: 50%; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background-color: #f2f2f2; }
  </style>
</head>
<body>

<h2>Search People</h2>
<input type="text" id="nameInput" placeholder="Enter name">
<button onclick="searchPeople()">Search</button>

<div id="results"></div>

<script>
async function searchPeople() {
  const name = document.getElementById('nameInput').value;
  const url = `http://localhost:8000/search?name=${encodeURIComponent(name)}`;

  try {
    const response = await fetch(url);
    const data = await response.json();

    if (data.error) {
      document.getElementById('results').innerHTML = `<p style="color:red;">Error: ${data.error}</p>`;
      return;
    }

    if (data.length === 0) {
      document.getElementById('results').innerHTML = "<p>No results found.</p>";
      return;
    }

    let table = "<table><tr><th>ID</th><th>Name</th><th>Age</th></tr>";
    data.forEach(row => {
      table += `<tr><td>${row.id}</td><td>${row.name}</td><td>${row.age}</td></tr>`;
    });
    table += "</table>";

    document.getElementById('results').innerHTML = table;

  } catch (err) {
    document.getElementById('results').innerHTML = `<p style="color:red;">Fetch error: ${err.message}</p>`;
  }
}
</script>

</body>
</html>
